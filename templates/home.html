<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker - AI Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Using your requested background image with a dark fallback */
            background-color: #0d1210;
            background-image: 
                linear-gradient(to right, rgba(13, 18, 16, 0.95) 0%, rgba(13, 18, 16, 0.6) 50%, rgba(13, 18, 16, 0.3) 100%),
                url('/static/images/expensetrack.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* GLASSMORPHISM NAVBAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin: 20px 40px;
            border-radius: 12px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(90deg, #f5d061, #e6af2e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            color: #ffffff;
            -webkit-text-fill-color: #ffffff;
        }

        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #d1d5d3;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #f5d061;
        }

        .nav-btn {
            padding: 10px 24px;
            border-radius: 8px;
            background: linear-gradient(90deg, #e6af2e, #d49511);
            color: #0d1210 !important;
            font-weight: 600;
            margin-left: 20px;
        }

        /* MAIN LAYOUT */
        .main-container {
            padding: 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HERO SECTION */
        .hero {
            max-width: 650px;
            animation: slideUp 1s ease-out;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 56px;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 20px;
            background: linear-gradient(to right, #f5d061, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #a8b3ac;
            margin-bottom: 35px;
            font-weight: 300;
            max-width: 90%;
        }

        .btn {
            display: inline-block;
            padding: 14px 35px;
            border-radius: 8px;
            background: linear-gradient(90deg, #e6af2e, #d49511);
            color: #0d1210;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 1px solid #f5d061;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(230, 175, 46, 0.3);
        }

        /* INLINE STATS BLOCK */
        .stats-container {
            display: flex;
            gap: 25px;
            margin-top: 50px;
            margin-bottom: 60px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 12px;
            min-width: 220px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* Subtle glow inside stat box */
        .stat-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(245, 208, 97, 0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .stat-box h3 {
            font-size: 14px;
            color: #d1d5d3;
            font-weight: 500;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .stat-number {
            font-size: 42px;
            font-weight: 700;
            color: #f5d061;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            z-index: 1;
        }

        /* GLASSMORPHISM FEATURES ROW */
        .features-container {
            display: flex;
            gap: 25px;
            max-width: 1000px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex: 1;
            padding: 30px 25px;
            border-radius: 12px;
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(245, 208, 97, 0.3);
        }

        .card h3 {
            margin-bottom: 12px;
            font-size: 18px;
            color: #ffffff;
            font-weight: 600;
        }

        .card p {
            color: #a8b3ac;
            font-size: 14px;
            font-weight: 300;
            line-height: 1.5;
        }

        /* ANIMATIONS */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            .stats-container, .features-container {
                flex-wrap: wrap;
            }
            .hero h1 { font-size: 42px; }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 20px;
                border-radius: 0;
                margin: 0;
            }
            nav ul { margin-top: 15px; flex-wrap: wrap; justify-content: center; gap: 10px; }
            nav ul li { margin: 5px; }
            .main-container { padding: 30px; }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Smart Expense <span>AI</span></div>
      <nav>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/features">Features</a></li>
        <li><a href="/contact">Contact</a></li>
        <li><a href="/login" class="nav-btn">Get Started</a></li>
    </ul>
</nav>
    </header>

    <div class="main-container">
        <section class="hero">
            <img src="/static/images/etracker-logo.png" alt="Expense Tracker Icon" style="width: 400px; max-width: 100%; margin-bottom: 20px; height: auto;">
            <p>
                Take control of your finances with AI-powered insights. 
                Track your spending and analyze patterns.
            </p>
            <a href="/login" class="btn">Get Started</a>
        </section>

        <section class="stats-container">
            <div class="stat-box">
                <h3>Daily Pushers</h3>
                <div class="stat-number" id="pushers-counter">0000</div>
            </div>
            <div class="stat-box">
                <h3>Income</h3>
                <div class="stat-number" id="income-counter">$0000</div>
            </div>
        </section>
    </div>

    <script>
        // Counter Animation Script
        function animateCounter(id, start, end, duration, prefix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                let currentVal = Math.floor(progress * (end - start) + start);
                let formattedVal = currentVal.toString().padStart(4, '0');
                
                obj.innerHTML = prefix + formattedVal;
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = prefix + end.toString().padStart(4, '0');
                }
            };
            window.requestAnimationFrame(step);
        }

        document.addEventListener("DOMContentLoaded", () => {
            animateCounter("pushers-counter", 0, 123, 7500); // Set real values here
            animateCounter("income-counter", 0, 1234, 7600, "₹");
        });
    </script>

</body>
</html>
