<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error</title>

    <style>
        body {
            background: #0d1210;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .box {
            text-align: center;
        }

        h1 {
            color: #f5d061;
            font-size: 40px;
        }

        p {
            color: #a8b3ac;
            margin-top: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #e6af2e;
            color: black;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Error</h1>
    <p>{{ message }}</p>
    <a href="/">Go Home</a>
</div>

</body>
</html>
