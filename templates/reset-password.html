<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Smart Expense Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* ELEGANT DARK BACKGROUND */
        body {
            background: radial-gradient(circle at top, #1a2a22 0%, #0d1210 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* SUBTLE DOT PATTERN OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* BACK TO LOGIN LINK */
        .back-home {
            position: absolute;
            top: 30px;
            left: 40px;
            text-decoration: none;
            color: #a8b3ac;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-home:hover {
            color: #f5d061;
        }

        /* RECOVERY CARD (Glassmorphism) */
        .login-card {
            background: rgba(26, 42, 34, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(230, 175, 46, 0.2);
            border-top: 3px solid #e6af2e; /* Gold top accent */
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADING */
        .login-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #f5d061);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p.subtitle {
            text-align: center;
            color: #a8b3ac;
            font-size: 13px;
            margin-bottom: 35px;
            font-weight: 300;
            line-height: 1.6;
        }

        /* FORM GROUPS */
        .input-group {
            margin-bottom: 30px; /* Slightly more space since there's only one input */
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #d1d5d3;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        /* INPUT FOCUS GLOW */
        .input-group input:focus {
            border-color: #f5d061;
            box-shadow: 0 0 10px rgba(230, 175, 46, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        /* LUXURY SUBMIT BUTTON */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #e6af2e, #d49511);
            color: #0d1210;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 175, 46, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 175, 46, 0.5);
            background: linear-gradient(90deg, #f5d061, #e6af2e);
        }

        /* RETURN TO LOGIN LINK */
        .signup-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #a8b3ac;
        }

        .signup-link a {
            color: #f5d061;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .signup-link a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .error-msg {
    background: rgba(255, 0, 0, 0.1);
    color: #ff4d4d;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    text-align: center;
}

.success-msg {
    background: rgba(0,255,0,0.1);
    color: #00ff88;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    text-align: center;
}
        /* RESPONSIVE */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 25px;
                width: 90%;
            }
            .back-home {
                top: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>

    <a href="/login" class="back-home">
        &#8592; Back to Login
    </a>

    <div class="login-card">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

        {% if error %}
<div class="error-msg">{{ error }}</div>
{% endif %}

{% if success %}
<div class="success-msg">{{ success }}</div>
{% endif %}

        <form action="/send-reset-link" method="POST">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <button type="submit" class="btn">Send Reset Link</button>
        </form>

        <p class="signup-link">
            Remembered your password? <a href="/login">Login</a>
        </p>
    </div>

</body>
</html>
