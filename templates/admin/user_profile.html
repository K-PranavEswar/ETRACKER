<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user["fullname"] }} - User Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* ELEGANT DARK BACKGROUND (Same as Admin Dashboard) */
        body {
            background: radial-gradient(circle at top left, #1a2a22 0%, #0d1210 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* SUBTLE DOT PATTERN OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* PROFILE CARD - GLASSMORPHISM */
        .profile-card {
            background: rgba(26, 42, 34, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(230, 175, 46, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        /* TOP GLOW LINE */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, #e6af2e, transparent);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER & AVATAR SECTION */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f5d061, #e6af2e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(230, 175, 46, 0.2);
            border: 3px solid rgba(13, 18, 16, 0.8);
        }

        .avatar svg {
            width: 40px;
            height: 40px;
            color: #0d1210;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .badge {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        /* INFO DETAILS SECTION */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 35px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(13, 18, 16, 0.4);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .info-item:hover {
            border-color: rgba(230, 175, 46, 0.3);
            background: rgba(230, 175, 46, 0.05);
            transform: translateX(5px);
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(230, 175, 46, 0.1);
            color: #f5d061;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box svg {
            width: 20px;
            height: 20px;
        }

        .info-content {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #a8b3ac;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .info-value {
            font-size: 15px;
            color: #ffffff;
            font-weight: 500;
            margin-top: 2px;
        }

        /* ACTIONS */
        .actions {
            display: flex;
            justify-content: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #0d1210;
            background: linear-gradient(90deg, #f5d061, #e6af2e);
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230, 175, 46, 0.3);
        }
        
        .back-btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        
        <div class="profile-header">
            <div class="avatar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <h1>{{ user["fullname"] }}</h1>
            <span class="badge">Verified User</span>
        </div>

        <div class="info-list">
            
            <div class="info-item">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
                <div class="info-content">
                    <span class="info-label">Email Address</span>
                    <span class="info-value">{{ user["email"] }}</span>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <div class="info-content">
                    <span class="info-label">Joined On</span>
                    <span class="info-value">{{ user["joined_on"] }}</span>
                </div>
            </div>

        </div>

        <div class="actions">
            <a href="/admin/users" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Users List
            </a>
        </div>

    </div>

</body>
</html>
