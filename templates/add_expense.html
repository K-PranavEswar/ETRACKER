<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Smart Expense Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* ELEGANT DARK BACKGROUND (Matching Dashboard) */
        body {
            background: radial-gradient(circle at top, #1a2a22 0%, #0d1210 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* SUBTLE DOT PATTERN OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* BACK TO DASHBOARD LINK */
        .back-home {
            position: absolute;
            top: 30px;
            left: 40px;
            text-decoration: none;
            color: #a8b3ac;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .back-home:hover {
            color: #f5d061;
        }

        /* EXPENSE CARD (Glassmorphism) */
        .expense-card {
            background: rgba(26, 42, 34, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(230, 175, 46, 0.2);
            border-top: 3px solid #e6af2e; /* Gold top accent */
            width: 100%;
            max-width: 450px;
            padding: 40px 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADING */
        .expense-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 30px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #f5d061);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .expense-card p.subtitle {
            text-align: center;
            color: #a8b3ac;
            font-size: 13px;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* FORM GROUPS */
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #d1d5d3;
            margin-bottom: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            appearance: none; /* Removes default dropdown arrow to style it custom */
        }

        /* Forces date picker and dropdowns to use dark mode styling */
        .input-group input[type="date"],
        .input-group select {
            color-scheme: dark;
        }

        /* Custom dropdown arrow for Select */
        .select-wrapper {
            position: relative;
        }
        
        .select-wrapper::after {
            content: '▼';
            font-size: 12px;
            color: #a8b3ac;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* INPUT FOCUS GLOW */
        .input-group input:focus,
        .input-group select:focus {
            border-color: #f5d061;
            box-shadow: 0 0 10px rgba(230, 175, 46, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        /* ROW FOR AMOUNT & DATE */
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .input-group {
            flex: 1;
        }

        /* LUXURY SUBMIT BUTTON */
        .btn {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #e6af2e, #d49511);
            color: #0d1210;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 175, 46, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 175, 46, 0.5);
            background: linear-gradient(90deg, #f5d061, #e6af2e);
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .expense-card {
                padding: 30px 20px;
                width: 100%;
            }
            .back-home {
                top: 15px;
                left: 15px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <a href="/dashboard" class="back-home">
        &#8592; Back to Dashboard
    </a>

    <div class="expense-card">
        <h2>Add Expense</h2>
        <p class="subtitle">Record a new transaction to track your spending.</p>

        <form action="/add-expense" method="POST">
            
            <div class="input-group">
                <label for="title">Expense Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., Grocery Shopping" required>
            </div>

            <div class="input-group select-wrapper">

    <label for="category">
        Category
    </label>

    <select id="category" name="category" required>

        <option value="" disabled selected>
            Select a category
        </option>

        {% for category in categories %}

        <option value="{{ category.category_name }}">

            {{ category.category_name }}

        </option>

        {% endfor %}

    </select>

</div>

            <div class="form-row">
                <div class="input-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" required>
                </div>

                <div class="input-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
            </div>

            <button type="submit" class="btn">Save Expense</button>
        </form>
    </div>

</body>
</html>
