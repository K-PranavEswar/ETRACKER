<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Expense Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* ENHANCED BACKGROUND (Matches Main Site) */
        body {
            background-color: #0d1210;
            background-image: linear-gradient(to right, rgba(13, 18, 16, 0.95), rgba(13, 18, 16, 0.85)), 
                              url("{{ url_for('static', filename='images/expensetrack.webp') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* BACK TO HOME LINK */
        .back-home {
            position: absolute;
            top: 40px;
            left: 50px;
            text-decoration: none;
            color: #a8b3ac;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .back-home:hover {
            color: #f5d061;
            transform: translateX(-5px);
        }

        /* ENHANCED LOGIN CARD */
        .login-wrapper {
            animation: floating 6s ease-in-out infinite;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 3px solid #f5d061;
            width: 100%;
            min-width: 420px;
            padding: 50px 45px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* HEADING */
        .login-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #f5d061);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p.subtitle {
            text-align: center;
            color: #a8b3ac;
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* FLOATING LABEL INPUT GROUPS */
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #a8b3ac;
            transition: 0.3s ease;
            z-index: 2;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group label {
            position: absolute;
            left: 48px;
            top: 50%;
            transform: translateY(-50%);
            color: #a8b3ac;
            font-size: 15px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Input Focus States */
        .input-group input:focus,
        .input-group input:not(:placeholder-shown) {
            border-color: rgba(245, 208, 97, 0.5);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(245, 208, 97, 0.1);
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -10px;
            left: 10px;
            font-size: 12px;
            background: #0f1513; /* Matches background */
            padding: 0 8px;
            color: #f5d061;
            border-radius: 4px;
        }

        .input-group input:focus ~ .input-icon {
            fill: #f5d061;
        }

        /* FORGOT PASSWORD */
        .forgot-pass {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 30px;
        }

        .forgot-pass a {
            color: #a8b3ac;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s ease;
        }

        .forgot-pass a:hover {
            color: #f5d061;
        }

        /* LUXURY SUBMIT BUTTON */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #e6af2e, #d49511);
            color: #0d1210;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 175, 46, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s ease;
        }

        .btn:hover::after {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 175, 46, 0.4);
            background: linear-gradient(90deg, #f5d061, #e6af2e);
        }

        /* SIGN UP LINK */
        .signup-link {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #a8b3ac;
        }

        .signup-link a {
            color: #f5d061;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
            margin-left: 5px;
        }

        .signup-link a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 25px;
                min-width: 90%;
            }
            .back-home {
                top: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>

    <a href="{{ url_for('home') }}" class="back-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your details to access your dashboard.</p>

            <form action="/login-user" method="POST">
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <input type="email" id="email" name="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <input type="password" id="password" name="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>

                <div class="forgot-pass">
                    <a href="/reset-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn">Login</button>
            </form>

            <p class="signup-link">
                New to SmartExpense? <a href="/register">Sign up here</a>
            </p>
        </div>
    </div>

</body>
</html>
